stages:
  - build
  - init
  - test
  - release

install-job:
  stage: build
  environment: development
  tags:
    - python
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
    - pip freeze
    - deactivate
  artifacts:
    expire_in: '60'
    paths:
      - venv

initialize-db-job:
  stage: init
  environment: development
  tags:
    - python
  script:
    - source venv/bin/activate
    - echo "DJANGO_SUPERUSER_USERNAME=TEST" >> secret.env
    - echo "DJANGO_SUPERUSER_PASSWORD=TEST" >> secret.env
    - echo "DJANGO_SUPERUSER_EMAIL=TEST@example.com" >> secret.env
    - python3 src/manage.py createsuperuser
    - python3 src/manage.py migrate
    - deactivate
    - rm -rf venv
  artifacts:
    expire_in: 1 week
    paths:
      - secret.env
      - src/*.sqlite3

runserver-job:
  stage: test
  environment: development
  tags:
    - python
  script:
    - source venv/bin/activate
    - python3 src/manage.py runserver localhost:8000 &
    - sleep 15
    - curl -sSf http://localhost:8000 > /dev/null && echo "Server is Up"

.dockerhub-job:
  stage: release
  environment: production
  tags:
    - python
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CONTAINER_IMAGE .
    - docker push $CONTAINER_IMAGE
  after_script:
    - docker logout

