build-job:
  stage: build
  script:
    - python -m venv $(pwd)/venv
    - source $(pwd)/venv/bin/activate
    - pip install -r requirements.txt
    - deactivate
  artifacts:
    paths:
      - $(pwd)/venv

test-job1:
  stage: test
  script:
    - source $(pwd)/venv/bin/activate
    - pip freeze

deploy-prod:
  stage: deploy
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
  environment: production