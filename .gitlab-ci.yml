build-job:
  stage: build
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
    - deactivate
  artifacts:
    paths:
      - venv

test-job:
  stage: test
  script:
    - source venv/bin/activate
    - pip freeze

deploy-prod:
  stage: deploy
  script:
    - echo "This job deploys something from the $CI_COMMIT_BRANCH branch."
  environment: production